<!DOCTYPE html>
<html>
<head>
    <link rel="icon" href="tomico.png">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

    <link rel="icon" href="steph_icon.png">
    <title>For Steph</title></head>
<body>

    <img src="waldo.png" usemap="#image-map">
    <div id="kids"></div>
    <map id="map" name="image-map">
        <area target="" alt="1" title="1" href="" coords="80,160,22" shape="circle">
        <area target="" alt="2" title="2" href="" coords="435,175,22" shape="circle">
        <area target="" alt="3" title="3" href="" coords="510,280,22" shape="circle">
        <area target="" alt="4" title="4" href="" coords="80,550,22" shape="circle">
        <area target="" alt="5" title="5" href="" coords="590,430,22" shape="circle">
        <area target="" alt="6" title="6" href="" coords="810,320,22" shape="circle">
        <area target="" alt="7" title="7" href="" coords="790,50,22" shape="circle">
        <area target="" alt="8" title="8" href="" coords="325,585,22" shape="circle">
        <area target="" alt="9" title="9" href="" coords="810,720,22" shape="circle">
        <area target="" alt="10" title="10" href="" coords="980,680,22" shape="circle">
        <area target="" alt="11" title="11" href="" coords="1000,190,22" shape="circle">
        <area target="" alt="12" title="12" href="" coords="360,740,22" shape="circle">
    </map>
<script>
    $(document).ready(function() {
        var t;
        setTimeout(function() {
            alert('We have now arrived to the Vision test. Let’s see if you need glasses or not. Find and click on all Steph and Celine faces you see.');
        }, 500);

        var friendsFound = {};

        function onclick(e) {
            e.preventDefault();
            
            $(this).css('background-color', 'rgba(0,255,0,0.5)');

            var name = this.getAttribute('alt');
            friendsFound[name] = 1;

            if (Object.keys(friendsFound).length === 12) {
                clearTimeout(t);
                setTimeout(function() {
                    confirm('Impressive.');
                    window.location.href = './sliding.html';
                }, 1);
            }

        }
        $('area').each(function() {
            var coords = this.coords.split(',');
            var x = coords[0];
            var y = coords[1];
            var r = coords[2];
            x = x - r;
            y = y - r;
            var d = $('<a alt="'+ this.alt +'" href=""></a>')
                .css('position', 'absolute')
                .css('display', 'block')
                .css('top', y+'px')
                .css('left', x+'px')
                .css('width', (r*2)+'px')
                .css('height', (r*2)+'px')
                .css('border-radius', r+'px')
                .css('background-color', 'rgba(0,255,0,0.5)')
                .on('click', onclick);
            $('#kids').append(d);
            this.remove();
        });
        
    });
</script>
</body>
</html>
