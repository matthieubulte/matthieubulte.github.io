<!DOCTYPE html>
<html>
<head>

<title>For Tom</title>
<style>
    body {
        background-image: url("tomtom.png");
        background-size: cover;
        background-repeat: no-repeat;
        font-size: 7rem;
        transition: transform 1s;
    }
    #kids {
        display: none;
        text-align: center;
    }
    #kids img {
        width: 30%;
        margin-top: 5rem;
    }
</style>

<body>
    
    <div id="kids">
        <div class="">
            Your present is a donation of CAD40 to
        </div>

        <div>

        </div>
    </div>


    
<script>
    $(document).ready(function() {
        setTimeout(function() {
            alert('Welcome to the Tomple, a temple dedicated to Tom. Click on any Tom to find out what your present is, Tom.');
        }, 1000);
    
        $(this).on('click', function() {
            $('body').css('background-image', 'none');
            $("#kids").css('display', 'inline');
        });
        
    });
</script>
